name: CI

# Tier A (build / syntax gate) + Tier B (automated tests).
#   - client:       vite build + Vitest unit tests (no DB)
#   - server:       install + node --check + Vitest unit tests (no DB)
#   - server-integration: Vitest API tests against a throwaway MariaDB service,
#                   schema loaded from the committed fixture (no secrets)
#   - php-lint:     php -l on the RMIT PHP app, pinned to prod's PHP 7.4
on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'claude/**']

jobs:
  client:
    name: Client build + unit tests (Vue/Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24 # box runs Node 26; bump or add to a matrix to match prod
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client
      - run: npm run test
        working-directory: client

  server:
    name: Server syntax + unit tests (Express)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - name: Syntax check
        working-directory: server
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Unit tests (no DB)
        working-directory: server
        run: npm run test:unit

  server-integration:
    name: Server integration tests (MariaDB)
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: bb_test
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_NAME: bb_test
      DB_USER: root
      DB_PASSWORD: root
      SESSION_SECRET: ci-test-secret
      COOKIE_SECURE: 'false'
      TRUST_PROXY: '0'
      # The throwaway service DB is safe to mutate, so exercise the destructive
      # prune DELETE (skipped against the shared dev DB locally).
      BB_TEST_DESTRUCTIVE: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - name: Load schema fixture into the service DB
        working-directory: server
        run: node test/load-fixture.mjs
      - name: Integration tests
        working-directory: server
        run: npm run test:integration

  php-lint:
    name: PHP lint (RMIT app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4' # match RMIT production (PHP 7.4.33)
      - name: php -l
        run: find . -name '*.php' -not -path '*/node_modules/*' -not -path '*/vendor/*' -print0 | xargs -0 -n1 -P4 php -l
