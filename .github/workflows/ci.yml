name: CI

# PHP-only lint gate. The Vue/Express/mobile migration code was split out to the
# BitBalance-App repo on 2026-06-05, so this repo is the vanilla PHP RMIT app only.
# `php -l` catches syntax errors against the production PHP version (7.4.33).
# Needs no secrets and no database.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  php-lint:
    name: PHP lint (RMIT app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4' # match RMIT production (PHP 7.4.33)
      - name: php -l
        run: find . -name '*.php' -not -path '*/node_modules/*' -not -path '*/vendor/*' -print0 | xargs -0 -n1 -P4 php -l
