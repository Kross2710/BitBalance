# ngrok config for BitBalance. Install to ~/.config/ngrok/ngrok.yml (or run
# `ngrok config edit`). Set your authtoken first: `ngrok config add-authtoken <TOKEN>`.
#
# Run the web tunnel:   ngrok start bitbalance
# (Free plan = ONE tunnel at a time. SSH from afar goes through Tailscale, not
#  ngrok — see deploy/DEPLOY-CachyOS.md — so we only need this single web tunnel.)
version: "3"
agent:
  authtoken: PASTE_YOUR_NGROK_AUTHTOKEN_HERE

tunnels:
  bitbalance:
    proto: http
    # Express serves both /api and the built SPA on :3000 — single origin.
    addr: 3000
    # A free static domain (claim one at dashboard.ngrok.com -> Domains) keeps
    # the URL stable across restarts. Delete this line to get a random URL.
    # domain: your-name.ngrok-free.app
