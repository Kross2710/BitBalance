<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype — Archetype Pokédex | Diet & Beats</title>
<style>
  :root{
    --green:#58cc02; --green-d:#4aa802; --orange:#ff9600; --blue:#1cb0f6;
    --purple:#a855f7; --grey:#b0b6c0; --grey-d:#8a909c;
    --ink:#2b2f38; --muted:#6b7280; --bg:#f3f6f4; --card:#ffffff;
    --border:#e3e7ea; --border-d:#d3d8dd;
    --font:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);padding:24px 16px 80px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto}

  .proto-flag{background:#fff7e6;border:2px dashed var(--orange);color:#a85d00;
    font-weight:800;font-size:13px;border-radius:12px;padding:8px 14px;margin-bottom:18px;text-align:center}

  .dex-head h1{font-size:24px;font-weight:900;display:flex;align-items:center;gap:8px}
  .dex-head p{color:var(--muted);font-weight:600;font-size:14px;margin-top:2px}

  .dex-progress{margin:16px 0 10px}
  .dex-progress .row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px}
  .dex-progress .count{font-weight:900;font-size:15px}
  .dex-progress .count b{color:var(--green);font-size:20px}
  .bar{height:14px;background:#e7ebe8;border-radius:99px;overflow:hidden;border:2px solid var(--border-d)}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--green),#86e01e);
    border-radius:99px;transition:width .7s cubic-bezier(.2,.8,.2,1)}

  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:14px 0 20px;font-size:12px;font-weight:800}
  .legend span{display:inline-flex;align-items:center;gap:5px;color:var(--muted)}
  .dot{width:11px;height:11px;border-radius:50%}
  .dot.common{background:var(--grey)} .dot.rare{background:var(--blue)}
  .dot.epic{background:var(--purple)} .dot.legendary{background:var(--orange)}

  .tools{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .btn{font-family:inherit;font-weight:800;font-size:14px;border:none;border-radius:14px;
    padding:11px 16px;cursor:pointer;transition:transform .08s;color:#fff}
  .btn:active{transform:translateY(3px)}
  .btn.catch{background:var(--green);box-shadow:0 4px 0 var(--green-d)}
  .btn.catch:active{box-shadow:0 1px 0 var(--green-d)}
  .btn.reset{background:#fff;color:var(--muted);border:2px solid var(--border-d);box-shadow:0 4px 0 var(--border-d)}
  .btn.reset:active{box-shadow:0 1px 0 var(--border-d)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}

  .card{position:relative;background:var(--card);border:2px solid var(--border);
    border-radius:18px;padding:16px 12px 14px;text-align:center;cursor:pointer;
    box-shadow:0 5px 0 var(--border-d);transition:transform .12s, box-shadow .12s}
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 0 var(--border-d)}
  .card:active{transform:translateY(2px);box-shadow:0 2px 0 var(--border-d)}
  .card .emoji{font-size:42px;line-height:1;filter:drop-shadow(0 3px 2px rgba(0,0,0,.12))}
  .card .name{font-weight:900;font-size:14px;margin-top:8px;line-height:1.2}
  .card .tier{margin-top:8px;display:inline-block;font-size:10px;font-weight:900;letter-spacing:.04em;
    text-transform:uppercase;padding:3px 9px;border-radius:99px;color:#fff}
  .card .hits{position:absolute;top:8px;right:10px;font-size:11px;font-weight:900;color:var(--muted)}

  /* rarity rings */
  .card.common{border-color:#dfe3e7}
  .card.rare{border-color:var(--blue);box-shadow:0 5px 0 #128fd0}
  .card.epic{border-color:var(--purple);box-shadow:0 5px 0 #8a36df}
  .card.legendary{border-color:var(--orange);box-shadow:0 5px 0 #d97e00;
    background:linear-gradient(180deg,#fffaf0,#fff)}
  .tier.common{background:var(--grey)} .tier.rare{background:var(--blue)}
  .tier.epic{background:var(--purple)} .tier.legendary{background:var(--orange)}

  /* shiny */
  .card.shiny::after{content:"✨";position:absolute;top:8px;left:10px;font-size:15px;
    animation:tw 1.6s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.4;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}

  /* locked */
  .card.locked{background:#eef1f0;border-color:#e0e4e3;box-shadow:0 5px 0 #d5dad8;cursor:default}
  .card.locked:hover{transform:none}
  .card.locked .emoji{filter:grayscale(1) blur(1px);opacity:.35}
  .card.locked .name{color:#aab0b8}
  .card.locked .q{position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);
    font-size:34px;font-weight:900;color:#c2c8cf}

  /* reveal animation */
  .card.justcaught{animation:pop .6s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(.3) rotate(-12deg);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1)}}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(20,24,30,.55);display:none;
    align-items:center;justify-content:center;padding:20px;z-index:50}
  .overlay.on{display:flex}
  .modal{background:#fff;border:2px solid var(--border);border-radius:24px;max-width:380px;width:100%;
    padding:26px 22px;text-align:center;box-shadow:0 10px 0 var(--border-d);animation:pop .4s cubic-bezier(.2,1.4,.4,1)}
  .modal .emoji{font-size:64px}
  .modal h2{font-size:22px;font-weight:900;margin-top:6px}
  .modal .tier{margin:10px auto 0}
  .modal .flavor{color:var(--muted);font-weight:600;font-style:italic;margin-top:12px;font-size:14px;line-height:1.5}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
  .stat{background:var(--bg);border:2px solid var(--border);border-radius:14px;padding:10px}
  .stat .k{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  .stat .v{font-size:17px;font-weight:900;margin-top:2px}
  .combo{margin-top:14px;background:var(--bg);border:2px solid var(--border);border-radius:14px;
    padding:10px 12px;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
  .combo small{color:var(--muted);font-weight:700}
  .modal .close{margin-top:18px}

  .confetti{position:fixed;width:10px;height:14px;z-index:60;pointer-events:none;border-radius:2px}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:0}}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-weight:800;font-size:14px;padding:12px 20px;border-radius:99px;
    opacity:0;transition:.3s;z-index:70}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <div class="proto-flag">⚠️ PROTOTYPE — dữ liệu giả để xem trước giao diện & tương tác. Chưa nối DB/AI.</div>

  <div class="dex-head">
    <h1>🎴 Bộ Sưu Tập Archetype</h1>
    <p>Mỗi lần Mix ra một "hình mẫu" mới → mở khoá vào dex. Gom đủ bộ!</p>
  </div>

  <div class="dex-progress">
    <div class="row">
      <span class="count"><b id="pCount">0</b> / <span id="pTotal">0</span> archetype đã mở khoá</span>
      <span class="count" id="pPct" style="color:var(--muted)">0%</span>
    </div>
    <div class="bar"><i id="pBar" style="width:0%"></i></div>
  </div>

  <div class="legend">
    <span><i class="dot common"></i> Common</span>
    <span><i class="dot rare"></i> Rare</span>
    <span><i class="dot epic"></i> Epic</span>
    <span><i class="dot legendary"></i> Legendary</span>
    <span>✨ = bản Shiny (mix đạt ≥ 90%)</span>
  </div>

  <div class="tools">
    <button class="btn catch" id="catchBtn">🎲 Giả lập "bắt" archetype mới</button>
    <button class="btn reset" id="resetBtn">Đặt lại</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
// ---- Mock dex (14 archetypes) ----
const DEX = [
  {key:'maestro',   name:'Nhạc Trưởng Cân Bằng', emoji:'🎯', tier:'common',
    flavor:'Cân bằng mọi mặt, hài hoà — tai và miệng đều biết điều.'},
  {key:'cozy',      name:'Tín Đồ An Yên',        emoji:'🧸', tier:'rare',
    flavor:'An yên, ổn định, gu quen thuộc dễ chịu.'},
  {key:'minimalist',name:'Người Tối Giản Thư Thái',emoji:'🍃',tier:'rare',
    flavor:'Nhẹ nhàng, tối giản, ít mà chất.'},
  {key:'snacker',   name:'Thợ Săn Bữa Phụ',      emoji:'⚡', tier:'rare',
    flavor:'Năng động, ăn vặt thông minh, bắt trend.'},
  {key:'strategist',name:'Chiến Lược Gia Bền Bỉ',emoji:'♟️', tier:'rare',
    flavor:'Bền bỉ, có kế hoạch, kiên định.'},
  {key:'acoustic',  name:'Tâm Hồn Acoustic',     emoji:'🎸', tier:'rare',
    flavor:'Mộc mạc, chân thành, ấm như một bản guitar gỗ.'},
  {key:'disco',     name:'Vũ Công Disco',        emoji:'🪩', tier:'rare',
    flavor:'Lúc nào cũng sẵn sàng quẩy — và ăn theo nhịp.'},
  {key:'explorer',  name:'Nhà Thám Hiểm Đa Sắc', emoji:'🌀', tier:'epic',
    flavor:'Phiêu lưu, đa dạng, không bao giờ lặp lại chính mình.'},
  {key:'hype',      name:'Cỗ Máy Bùng Nổ',       emoji:'🔥', tier:'epic',
    flavor:'Bốc lửa, dồn dập, sống hết công suất.'},
  {key:'dreamer',   name:'Mộng Mơ Hảo Ngọt',     emoji:'🍰', tier:'epic',
    flavor:'Mơ mộng, hảo ngọt, luôn chiều bản thân trước.'},
  {key:'lofi',      name:'Thiền Giả Lo-Fi',      emoji:'🌫️', tier:'epic',
    flavor:'Tĩnh tại giữa beat chillhop, ăn chậm nhai kỹ.'},
  {key:'sprinter',  name:'Vận Động Viên Kỷ Luật',emoji:'🏋️', tier:'epic',
    flavor:'Năng lượng cao, kỷ luật, ăn sạch nghe bốc.'},
  {key:'romantic',  name:'Kẻ Lãng Mạn Nửa Đêm',  emoji:'🌙', tier:'legendary',
    flavor:'Cú đêm, nhạc dịu, đồ ăn an ủi — biểu tượng của sự sâu lắng.'},
  {key:'phonk',     name:'Tiệc Đêm Phonk',        emoji:'🛸', tier:'legendary',
    flavor:'Bass nặng lúc 2h sáng + mì cay — combo huyền thoại.'},
];

// initial owned state (mock)
const SEED = {
  maestro:{hits:9, best:71, first:'2 Th5', combo:['Bohemian Rhapsody','Cơm tấm'], shiny:false},
  explorer:{hits:5, best:83, first:'5 Th5', combo:['As It Was','Phở'], shiny:false},
  cozy:{hits:3, best:64, first:'8 Th5', combo:['lofi hip hop','Cháo yến mạch'], shiny:false},
  dreamer:{hits:2, best:91, first:'11 Th5', combo:['Cardigan','Bánh flan'], shiny:true},
  hype:{hits:1, best:58, first:'14 Th5', combo:['Phonk Mix','Ức gà'], shiny:false},
  sprinter:{hits:4, best:77, first:'15 Th5', combo:['Stronger','Whey shake'], shiny:false},
  snacker:{hits:2, best:69, first:'18 Th5', combo:['Levitating','Hạt điều'], shiny:false},
};
const TIER_VI = {common:'Common', rare:'Rare', epic:'Epic', legendary:'Legendary'};
let owned = {};

function reset(){ owned = JSON.parse(JSON.stringify(SEED)); render(); }

function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  DEX.forEach(a => {
    const o = owned[a.key];
    const el = document.createElement('div');
    if(!o){
      el.className = 'card locked';
      el.innerHTML = `<div class="emoji">${a.emoji}</div><div class="q">?</div><div class="name">???</div>`;
      el.onclick = () => toast('Chưa mở khoá — Mix thêm để khám phá! 🔒');
    } else {
      el.className = `card ${a.tier}` + (o.shiny ? ' shiny' : '');
      el.innerHTML = `<span class="hits">×${o.hits}</span>
        <div class="emoji">${a.emoji}</div>
        <div class="name">${a.name}</div>
        <span class="tier ${a.tier}">${TIER_VI[a.tier]}</span>`;
      el.onclick = () => openModal(a, o);
    }
    grid.appendChild(el);
  });
  const total = DEX.length, got = Object.keys(owned).length, pct = Math.round(got/total*100);
  document.getElementById('pCount').textContent = got;
  document.getElementById('pTotal').textContent = total;
  document.getElementById('pPct').textContent = pct + '%';
  document.getElementById('pBar').style.width = pct + '%';
}

function openModal(a, o){
  document.getElementById('modal').innerHTML = `
    <div class="emoji">${a.emoji}${o.shiny?' ✨':''}</div>
    <h2>${a.name}</h2>
    <span class="tier ${a.tier}">${TIER_VI[a.tier]}</span>
    <p class="flavor">"${a.flavor}"</p>
    <div class="stats">
      <div class="stat"><div class="k">Số lần bắt</div><div class="v">×${o.hits}</div></div>
      <div class="stat"><div class="k">Best Đồng Điệu</div><div class="v">${o.best}%</div></div>
      <div class="stat"><div class="k">Lần đầu</div><div class="v">${o.first}</div></div>
      <div class="stat"><div class="k">Bản Shiny</div><div class="v">${o.shiny?'✨ Có':'—'}</div></div>
    </div>
    <div class="combo"><small>Combo đỉnh nhất:</small> 🎵 ${o.combo[0]} <span style="color:var(--purple)">✕</span> 🍽️ ${o.combo[1]}</div>
    <button class="btn reset close" onclick="closeModal()" style="width:100%;box-shadow:0 4px 0 var(--border-d)">Đóng</button>`;
  document.getElementById('overlay').classList.add('on');
}
function closeModal(){ document.getElementById('overlay').classList.remove('on'); }
document.getElementById('overlay').onclick = e => { if(e.target.id==='overlay') closeModal(); };

function toast(msg){
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('on'), 2200);
}

function confettiBurst(){
  const colors=['#58cc02','#ff9600','#1cb0f6','#a855f7'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=(40+Math.random()*20)+'vw'; c.style.top='-20px';
    c.style.background=colors[i%4];
    c.style.animation=`fall ${1+Math.random()*1.2}s ${Math.random()*.3}s linear forwards`;
    c.style.transform=`translateX(${(Math.random()*200-100)}px)`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),2600);
  }
}

document.getElementById('catchBtn').onclick = () => {
  const locked = DEX.filter(a => !owned[a.key]);
  if(!locked.length){ toast('Đã sưu đủ bộ! 🏆'); return; }
  const a = locked[Math.floor(Math.random()*locked.length)];
  const best = 50 + Math.floor(Math.random()*50);
  owned[a.key] = {hits:1, best, first:'Hôm nay', combo:['Bài vừa nghe','Món vừa log'], shiny: best>=90};
  render();
  confettiBurst();
  toast(`Khám phá mới: ${a.emoji} ${a.name}!`);
  // pop animation on the new card
  const cards = [...document.querySelectorAll('.grid .card')];
  const idx = DEX.findIndex(d=>d.key===a.key);
  if(cards[idx]){ cards[idx].classList.add('justcaught'); }
};
document.getElementById('resetBtn').onclick = reset;

reset();
</script>
</body>
</html>
